<svg viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <defs>
    <marker id="a4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8A93A6"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#0B1220"/>

  <!-- Core -->
  <rect x="380" y="200" width="200" height="80" rx="8" fill="#121B2E" stroke="#1F2C45" stroke-width="1.5"/>
  <text x="480" y="228" fill="#E8A33D" font-size="13" text-anchor="middle" font-weight="700">CORE</text>
  <text x="480" y="246" fill="#ECE6DA" font-size="11" text-anchor="middle">scanner.py + analyzer.py</text>
  <text x="480" y="262" fill="#8A93A6" font-size="10" text-anchor="middle">TLS handshake, x.509 parsing, risk rules</text>

  <!-- CLI path -->
  <rect x="120" y="80" width="170" height="60" rx="8" fill="#121B2E" stroke="#1F2C45" stroke-width="1.5"/>
  <text x="205" y="106" fill="#ECE6DA" font-size="12" text-anchor="middle" font-weight="600">cli.py</text>
  <text x="205" y="123" fill="#8A93A6" font-size="10" text-anchor="middle">alerts.py + exporters.py</text>

  <!-- API path -->
  <rect x="120" y="320" width="170" height="80" rx="8" fill="#121B2E" stroke="#4FB6A8" stroke-width="1.5"/>
  <text x="205" y="345" fill="#4FB6A8" font-size="12" text-anchor="middle" font-weight="700">api/main.py</text>
  <text x="205" y="362" fill="#ECE6DA" font-size="10.5" text-anchor="middle">FastAPI, async scans</text>
  <text x="205" y="377" fill="#8A93A6" font-size="10" text-anchor="middle">storage.py (SQLite)</text>

  <!-- Consumers -->
  <rect x="660" y="80" width="220" height="60" rx="8" fill="#121B2E" stroke="#1F2C45" stroke-width="1.5"/>
  <text x="770" y="106" fill="#ECE6DA" font-size="12" text-anchor="middle" font-weight="600">CI/CD pipeline</text>
  <text x="770" y="123" fill="#8A93A6" font-size="10" text-anchor="middle">--fail-on-critical as a gate</text>

  <rect x="660" y="320" width="220" height="80" rx="8" fill="#121B2E" stroke="#4FB6A8" stroke-width="1.5"/>
  <text x="770" y="345" fill="#4FB6A8" font-size="12" text-anchor="middle" font-weight="700">External systems</text>
  <text x="770" y="362" fill="#ECE6DA" font-size="10.5" text-anchor="middle">dashboard, SIEM, CMDB</text>
  <text x="770" y="377" fill="#8A93A6" font-size="10" text-anchor="middle">GET /certificates</text>

  <!-- Ansible deployment, bottom -->
  <rect x="320" y="420" width="320" height="46" rx="8" fill="#0B1220" stroke="#E8A33D" stroke-width="1.5"/>
  <text x="480" y="448" fill="#E8A33D" font-size="11.5" text-anchor="middle">Ansible deploys cli.py (timer) + api/main.py (service) via systemd</text>

  <!-- Arrows -->
  <line x1="290" y1="110" x2="378" y2="220" stroke="#8A93A6" stroke-width="1.4" marker-end="url(#a4)"/>
  <line x1="580" y1="220" x2="658" y2="110" stroke="#8A93A6" stroke-width="1.4" marker-end="url(#a4)"/>
  <line x1="290" y1="360" x2="378" y2="260" stroke="#4FB6A8" stroke-width="1.4" marker-end="url(#a4)"/>
  <line x1="580" y1="260" x2="658" y2="360" stroke="#4FB6A8" stroke-width="1.4" marker-end="url(#a4)"/>

  <text x="480" y="195" fill="#8A93A6" font-size="11" text-anchor="middle">two entry points, one shared core - no duplicated scanning logic</text>
</svg>
